<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>George — Lyrics Display</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230a0a0c'/><text y='.9em' font-size='72' font-family='Georgia,serif' fill='%231db954' x='12'>G</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inconsolata:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0a0a0c;
  --bg2:       #111114;
  --bg3:       #18181d;
  --border:    #1e1e24;
  --green:     #1db954;
  --green-dim: rgba(29,185,84,.12);
  --text:      #ffffff;
  --text-dim:  #7a7a8e;
  --text-faint:#252530;
  --rust:      #e05a4a;
  --gold:      #c9a84c;
  --panel-w:   300px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; overflow: hidden; }

/* ══ DYNAMIC BG BLUR — subtle, only behind right panel ══ */
#bg-blur {
  position: fixed; top: -40px; right: -40px; bottom: -40px;
  width: calc(var(--panel-w) + 80px);
  z-index: 0;
  background-size: cover; background-position: center;
  filter: blur(60px) saturate(1.1) brightness(.15);
  opacity: 0; transition: opacity 2s ease;
  pointer-events: none;
}
#bg-blur.visible { opacity: 1; }

/* ══ SCREENS ══ */
.screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; transition: opacity .4s, transform .4s; z-index: 10; }
.screen.hidden { opacity: 0; pointer-events: none; transform: translateY(14px); }

/* ══ LOGIN ══ */
#login-screen { background: var(--bg); flex-direction: column; }

/* SVG preview behind login */
.login-preview {
  position: fixed; inset: 0; z-index: 0;
  overflow: hidden;
}
.login-preview svg {
  width: 100%; height: 100%;
  filter: blur(3px) brightness(.55);
  transform: scale(1.04);
}
/* Dark vignette on top of preview */
.login-preview::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 80% at 50% 50%, rgba(10,10,12,.45) 0%, rgba(10,10,12,.82) 100%);
}
.login-card {
  position: relative; z-index: 2; width: min(440px, 92vw);
  background: rgba(14,14,18,.92); border: 1px solid var(--border); border-radius: 14px; padding: 40px 36px;
  backdrop-filter: blur(16px);
  box-shadow: 0 24px 80px rgba(0,0,0,.6);
}
.login-logo { font-size: 1.8rem; font-weight: 700; letter-spacing: -.04em; margin-bottom: 2px; }
.login-logo span { color: var(--green); }
.login-sub { font-size: .8rem; color: var(--text-dim); margin-bottom: 32px; font-weight: 300; }
.field-label { font-family: 'Inconsolata',monospace; font-size: .6rem; letter-spacing: .18em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 7px; display: block; }
.field-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: 'Inconsolata',monospace; font-size: .88rem; padding: 9px 13px; outline: none; transition: border-color .2s; margin-bottom: 14px; }
.field-input:focus { border-color: var(--green); }
.field-input::placeholder { color: var(--text-faint); }
.field-hint { font-size: .72rem; color: var(--text-dim); margin-top: -8px; margin-bottom: 14px; line-height: 1.55; font-weight: 300; }
.field-hint a { color: var(--gold); }
.field-hint code { font-family: 'Inconsolata',monospace; font-size: .7rem; color: var(--green); background: var(--bg3); padding: 1px 5px; border-radius: 3px; word-break: break-all; }
.btn-login { width: 100%; margin-top: 10px; padding: 12px; background: var(--green); color: #000; font-family: 'Outfit',sans-serif; font-size: .85rem; font-weight: 600; letter-spacing: .02em; border: none; border-radius: 50px; cursor: pointer; transition: background .2s, transform .1s; }
.btn-login:hover { background: #22e361; transform: translateY(-1px); }

/* ══ LOADING ══ */
#loading-screen { flex-direction: column; gap: 14px; background: var(--bg); }
.load-logo { font-size: 1.6rem; font-weight: 700; letter-spacing: -.04em; color: var(--text-dim); }
.load-logo span { color: var(--green); }
.load-dots { display: flex; gap: 5px; }
.load-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: bounce .9s ease-in-out infinite; }
.load-dots span:nth-child(2) { animation-delay: .15s; }
.load-dots span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,80%,100%{transform:scale(.5);opacity:.3} 40%{transform:scale(1);opacity:1} }
.load-status { font-family: 'Inconsolata',monospace; font-size: .62rem; letter-spacing: .15em; color: var(--text-faint); text-transform: uppercase; }

/* ══ PLAYER ══ */
#player-screen { align-items: stretch; z-index: 1; }
.layout { display: grid; grid-template-columns: 1fr var(--panel-w); width: 100%; height: 100vh; position: relative; }

/* ══ LEFT: LYRICS AREA ══ */
.col-lyrics { display: flex; flex-direction: column; overflow: hidden; position: relative; }

/* Top bar */
.lyrics-topbar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 5;
  padding: 18px 48px 0;
  display: flex; align-items: center; justify-content: space-between;
  pointer-events: none;
}
.track-badge {
  display: flex; align-items: center; gap: 10px;
  pointer-events: auto;
}
.track-badge-art {
  width: 44px; height: 44px; border-radius: 6px; object-fit: cover;
  border: 1px solid rgba(255,255,255,.1); flex-shrink: 0;
  background: var(--bg3);
}
.track-badge-info { overflow: hidden; }
.track-badge-name { font-size: .88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 320px; line-height: 1.2; }
.track-badge-sub { font-size: .72rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 320px; }
.track-badge-sub span { color: var(--green); }

.topbar-right { display: flex; align-items: center; gap: 8px; pointer-events: auto; }
.badge-pill {
  font-family: 'Inconsolata',monospace; font-size: .58rem; letter-spacing: .06em;
  color: var(--text-dim); border: 1px solid var(--border);
  background: rgba(10,10,12,.6); backdrop-filter: blur(8px);
  padding: 3px 9px; border-radius: 50px;
}
.badge-pill.synced { color: var(--green); border-color: var(--green-dim); background: rgba(29,185,84,.08); }
.badge-pill.bpm { color: var(--gold); border-color: rgba(201,168,76,.2); }
.btn-icon {
  background: rgba(10,10,12,.6); backdrop-filter: blur(8px);
  border: 1px solid var(--border); color: var(--text-dim);
  width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: color .15s, border-color .15s;
  font-size: .7rem; font-family: 'Inconsolata',monospace;
}
.btn-icon:hover { color: var(--text); border-color: var(--text-dim); }
.btn-icon.active { color: var(--green); border-color: var(--green); }

/* Lyrics viewport */
.lyrics-viewport {
  flex: 1; overflow: hidden; position: relative;
  mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 75%, transparent 100%);
  -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 75%, transparent 100%);
}
.lyrics-scroll {
  padding: 110px 48px 300px;
  will-change: transform;
  transition: transform 1s cubic-bezier(.16,.84,.44,1);
}

/* Lyric lines */
:root { --lyr-base: 2rem; --lyr-active: 2.8rem; }
.lyric-line {
  font-size: var(--lyr-base); font-weight: 500; line-height: 1.25; margin-bottom: 4px;
  color: var(--text-faint); white-space: pre-wrap;
  transition: color .45s ease, transform .45s ease, font-size .38s ease, font-weight .38s ease, opacity .45s ease;
  transform-origin: left center;
}
.lyric-line.blank { height: 22px; margin-bottom: 0; }
.lyric-line.past   { color: #222230; font-size: calc(var(--lyr-base) * .83); font-weight: 400; opacity: .5; }
.lyric-line.active { color: #ffffff; font-size: var(--lyr-active); font-weight: 700; transform: translateX(6px); opacity: 1; letter-spacing: -.01em; }
.lyric-line.next   { color: #4a4a60; font-size: calc(var(--lyr-base) * .95); font-weight: 400; transform: translateX(3px); opacity: .6; }
.lyric-line.future { color: var(--text-faint); font-size: calc(var(--lyr-base) * .83); font-weight: 300; opacity: .28; }

/* Fullscreen larger sizes */
body.fullscreen .lyric-line { font-size: calc(var(--lyr-base) * 1.3); }
body.fullscreen .lyric-line.active { font-size: calc(var(--lyr-active) * 1.28); }
body.fullscreen .lyric-line.past { font-size: calc(var(--lyr-base) * 1.05); }
body.fullscreen .lyric-line.future { font-size: calc(var(--lyr-base) * 1.05); }
body.fullscreen .lyric-line.next { font-size: calc(var(--lyr-base) * 1.3); }

.lyrics-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; color: var(--text-dim); }
.lyrics-empty .icon { font-size: 3rem; opacity: .08; }
.lyrics-empty p { font-family: 'Inconsolata',monospace; font-size: .65rem; letter-spacing: .15em; text-transform: uppercase; }

/* Fullscreen mode */
body.fullscreen .col-right { display: none; }
body.fullscreen .layout { grid-template-columns: 1fr; }
body.fullscreen .lyrics-topbar { padding-right: 48px; }

/* ══ RIGHT PANEL ══ */
.col-right {
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  background: rgba(10,10,12,.85); backdrop-filter: blur(20px);
}

/* Progress */
.progress-block { padding: 10px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.prog-track { width: 100%; height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 5px; }
.prog-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width .25s linear; }
.prog-times { display: flex; justify-content: space-between; font-family: 'Inconsolata',monospace; font-size: .6rem; color: var(--text-dim); }

/* Controls */
.controls-block { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.ctrl { background: none; border: none; cursor: pointer; color: var(--text-faint); padding: 7px; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: color .15s, background .15s; }
.ctrl:hover { color: var(--text-dim); background: var(--bg3); }
.ctrl.on { color: var(--green); }
/* Play button — subtle, blends in, text is the star */
.ctrl.play-btn {
  background: var(--bg3); color: var(--text-dim);
  width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
  border: 1px solid var(--border);
}
.ctrl.play-btn:hover { background: var(--border); color: var(--text); }

/* ══ KARAOKE MODE ══ */
body.karaoke .lyric-line { transition: none !important; }
body.karaoke .lyric-line.active {
  position: relative; overflow: hidden;
  color: transparent !important;
  -webkit-text-stroke: 0;
}
body.karaoke .lyric-line.active::before {
  content: attr(data-text);
  position: absolute; left: 0; top: 0; bottom: 0;
  white-space: pre-wrap;
  color: #ffffff;
  width: var(--kar-pct, 0%);
  overflow: hidden;
}
body.karaoke .lyric-line.active::after {
  content: attr(data-text);
  position: absolute; left: 0; top: 0;
  white-space: pre-wrap;
  color: var(--text-faint);
  opacity: .25;
}

/* ══ LYRIC SEEK ══ */
.lyric-line:not(.blank) { cursor: pointer; }
.lyric-line:not(.blank):hover { opacity: .85 !important; }

/* ══ FULLSCREEN — wider lyrics ══ */
body.fullscreen .col-right { display: none; }
body.fullscreen .layout { grid-template-columns: 1fr; }
body.fullscreen .lyrics-topbar { padding-right: 48px; }
body.fullscreen .lyrics-scroll { padding-left: 80px; padding-right: 80px; }

/* ══ MOOD PLAYLIST POPUP ══ */
.popup-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .25s;
}
.popup-overlay.open { opacity: 1; pointer-events: auto; }
.popup-box {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 14px;
  width: min(500px, 92vw); max-height: 80vh;
  display: flex; flex-direction: column;
  overflow: hidden;
  transform: translateY(16px); transition: transform .25s;
  box-shadow: 0 32px 80px rgba(0,0,0,.6);
}
.popup-overlay.open .popup-box { transform: translateY(0); }
.popup-hdr {
  padding: 20px 22px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
}
.popup-title { font-size: .95rem; font-weight: 600; }
.popup-sub { font-size: .72rem; color: var(--text-dim); margin-top: 2px; }
.popup-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.2rem; padding: 4px 8px; border-radius: 6px; }
.popup-close:hover { color: var(--text); background: var(--bg3); }
.popup-body { flex: 1; overflow-y: auto; padding: 12px 0; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.popup-track {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 22px; transition: background .12s;
}
.popup-track:hover { background: var(--bg3); }
.popup-track-num { font-family: 'Inconsolata',monospace; font-size: .6rem; color: var(--text-faint); min-width: 18px; text-align: right; }
.popup-track-art { width: 36px; height: 36px; border-radius: 4px; object-fit: cover; background: var(--bg3); flex-shrink: 0; }
.popup-track-info { flex: 1; overflow: hidden; }
.popup-track-name { font-size: .82rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.popup-track-artist { font-size: .68rem; color: var(--text-dim); font-weight: 300; }
.popup-track-match { font-family: 'Inconsolata',monospace; font-size: .58rem; color: var(--green); flex-shrink: 0; }
.popup-footer {
  padding: 14px 22px; border-top: 1px solid var(--border); flex-shrink: 0;
  display: flex; gap: 8px; flex-wrap: wrap;
}
.popup-btn {
  flex: 1; min-width: 80px; padding: 9px 12px;
  background: var(--bg3); border: 1px solid var(--border); border-radius: 7px;
  color: var(--text-dim); font-family: 'Outfit',sans-serif; font-size: .78rem; font-weight: 500;
  cursor: pointer; transition: all .2s; text-align: center;
}
.popup-btn:hover { border-color: var(--green); color: var(--text); }
.popup-btn.primary { background: var(--green); color: #000; border-color: var(--green); font-weight: 600; }
.popup-btn.primary:hover { background: #22e361; }
.util-row { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.util-row svg { color: var(--text-dim); flex-shrink: 0; }
input[type=range].vol { -webkit-appearance: none; flex: 1; height: 3px; background: var(--border); border-radius: 2px; cursor: pointer; accent-color: var(--green); }
input[type=range].vol::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: var(--text); }
.btn-sm { background: none; border: 1px solid var(--border); color: var(--text-dim); font-family: 'Inconsolata',monospace; font-size: .56rem; letter-spacing: .1em; text-transform: uppercase; padding: 4px 8px; border-radius: 50px; cursor: pointer; transition: all .2s; white-space: nowrap; flex-shrink: 0; }
.btn-sm:hover { border-color: var(--text-dim); color: var(--text); }
.btn-sm.on { color: var(--green); border-color: var(--green); }
.btn-sm.danger:hover { border-color: var(--rust); color: var(--rust); }

/* AI Info panel */
.ai-block { padding: 10px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.ai-btn {
  width: 100%; padding: 8px 12px;
  background: var(--bg3); border: 1px solid var(--border); border-radius: 7px;
  color: var(--text-dim); font-family: 'Outfit',sans-serif; font-size: .75rem; font-weight: 500;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all .2s;
}
.ai-btn:hover { border-color: var(--green); color: var(--text); }
.ai-btn.loading { animation: blink 1.2s ease infinite; pointer-events: none; }
.ai-btn .lang-toggle { margin-left: auto; font-family: 'Inconsolata',monospace; font-size: .6rem; color: var(--text-faint); }
@keyframes blink { 0%,100%{opacity:.5} 50%{opacity:1} }

/* AI info content panel */
.ai-info-panel { flex: 1; overflow-y: auto; scrollbar-width: none; }
.ai-info-panel::-webkit-scrollbar { display: none; }

.ai-section { padding: 10px 16px 4px; border-bottom: 1px solid rgba(30,30,36,.6); }
.ai-section-title { font-family: 'Inconsolata',monospace; font-size: .55rem; letter-spacing: .2em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 7px; }
.ai-insight { margin-bottom: 8px; }
.ai-insight-label { font-size: .58rem; font-weight: 600; color: var(--text-dim); letter-spacing: .04em; text-transform: uppercase; font-family: 'Inconsolata',monospace; margin-bottom: 2px; }
.ai-insight-text { font-size: .75rem; color: #7a7a96; line-height: 1.55; font-weight: 300; }
.tag-row { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
.tag { font-family: 'Inconsolata',monospace; font-size: .55rem; color: var(--text-dim); background: var(--bg3); border: 1px solid var(--border); padding: 2px 6px; border-radius: 50px; }

/* Concerts */
.concert-item { padding: 5px 0; border-bottom: 1px solid rgba(30,30,36,.5); }
.concert-item:last-child { border-bottom: none; }
.concert-date { font-family: 'Inconsolata',monospace; font-size: .58rem; color: var(--green); }
.concert-venue { font-size: .72rem; font-weight: 500; line-height: 1.3; }
.concert-city { font-size: .65rem; color: var(--text-dim); font-weight: 300; }
.ai-empty { font-size: .68rem; color: var(--text-faint); font-style: italic; font-family: 'Inconsolata',monospace; padding: 6px 0; }

/* Queue */
.queue-hdr { padding: 12px 16px 8px; font-family: 'Inconsolata',monospace; font-size: .58rem; letter-spacing: .2em; color: var(--text-dim); text-transform: uppercase; flex-shrink: 0; }
.queue-list { overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.queue-list::-webkit-scrollbar { width: 3px; }
.queue-list::-webkit-scrollbar-thumb { background: var(--border); }
.q-item { display: flex; align-items: center; gap: 8px; padding: 6px 16px; border-bottom: 1px solid rgba(30,30,36,.6); transition: background .12s; }
.q-item:hover { background: var(--bg3); }
.q-num { font-family: 'Inconsolata',monospace; font-size: .55rem; color: var(--text-faint); min-width: 14px; text-align: right; flex-shrink: 0; }
.q-art { width: 32px; height: 32px; border-radius: 3px; object-fit: cover; flex-shrink: 0; background: var(--bg3); }
.q-info { overflow: hidden; flex: 1; }
.q-title { font-size: .75rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.q-artist { font-size: .65rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 300; }
.q-dur { font-family: 'Inconsolata',monospace; font-size: .58rem; color: var(--text-dim); flex-shrink: 0; }

/* Lyrics fade transition between tracks */
.lyrics-scroll { transition: transform 1s cubic-bezier(.16,.84,.44,1), opacity .3s ease; }
.lyrics-scroll.fading { opacity: 0; }

/* Queue currently playing item */
.q-item.now-playing { background: rgba(29,185,84,.06); }
.q-item.now-playing .q-title { color: var(--green); }
.q-item.now-playing .q-num { color: var(--green); }
#toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(12px); background: var(--bg3); color: var(--text); font-family: 'Inconsolata',monospace; font-size: .72rem; padding: 8px 18px; border: 1px solid var(--border); border-radius: 50px; opacity: 0; transition: all .3s; pointer-events: none; z-index: 9999; white-space: nowrap; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.err { border-color: var(--rust); color: var(--rust); }
</style>
</head>
<body>

<!-- BG BLUR -->
<div id="bg-blur"></div>

<!-- LOGIN -->
<div id="login-screen" class="screen">

  <!-- Preview screenshot background -->
  <div class="login-preview">
    <svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="lyrFade" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0a0a0c" stop-opacity="1"/>
          <stop offset="12%" stop-color="#0a0a0c" stop-opacity="0"/>
          <stop offset="72%" stop-color="#0a0a0c" stop-opacity="0"/>
          <stop offset="100%" stop-color="#0a0a0c" stop-opacity="1"/>
        </linearGradient>
        <!-- Subtle right-panel blur glow from album art -->
        <radialGradient id="panelGlow" cx="100%" cy="60%" r="60%">
          <stop offset="0%" stop-color="#2a1a08" stop-opacity=".9"/>
          <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <!-- BG -->
      <rect width="1440" height="900" fill="#0a0a0c"/>

   CONFIG

const SCOPES = [
  'user-read-playback-state','user-modify-playback-state',
  'user-read-currently-playing','user-read-private','user-read-email'
].join(' ');
const REDIR = location.origin + location.pathname;
document.getElementById('redir-display').textContent = REDIR;

/* ══════════════════════════════════════
   PKCE
══════════════════════════════════════ */
function randStr(n) {
  const c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  const b=new Uint8Array(n); crypto.getRandomValues(b);
  return Array.from(b,x=>c[x%c.length]).join('');
}
async function pkce(v) {
  const d=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));
  return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

/* ══════════════════════════════════════
   AUTH
══════════════════════════════════════ */
async function doLogin() {
  const cid=document.getElementById('cid').value.trim();
  if(!cid){toast('Zadejte Spotify Client ID',true);return;}
  localStorage.setItem('sp_cid',cid);
  const gk=document.getElementById('gkey').value.trim();
  if(gk) saveGeminiKey(gk);
  const ver=randStr(64); localStorage.setItem('sp_ver',ver);
  const ch=await pkce(ver);
  location.href='https://accounts.spotify.com/authorize?'+new URLSearchParams({
    client_id:cid,response_type:'code',redirect_uri:REDIR,
    code_challenge_method:'S256',code_challenge:ch,scope:SCOPES
  });
}
async function exchangeCode(code) {
  const r=await fetch('https://accounts.spotify.com/api/token',{
    method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams({client_id:localStorage.getItem('sp_cid'),
      grant_type:'authorization_code',code,redirect_uri:REDIR,
      code_verifier:localStorage.getItem('sp_ver')})
  });
  const d=await r.json(); if(d.access_token) saveTok(d); return !!d.access_token;
}
async function doRefresh() {
  const r=await fetch('https://accounts.spotify.com/api/token',{
    method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams({client_id:localStorage.getItem('sp_cid'),
      grant_type:'refresh_token',refresh_token:localStorage.getItem('sp_rt')})
  });
  const d=await r.json(); if(d.access_token) saveTok(d); return !!d.access_token;
}
function saveTok(d) {
  localStorage.setItem('sp_at',d.access_token);
  localStorage.setItem('sp_exp',Date.now()+d.expires_in*1000);
  if(d.refresh_token) localStorage.setItem('sp_rt',d.refresh_token);
}
async function getTok() {
  if(Date.now()>(parseInt(localStorage.getItem('sp_exp'))||0)-60000) await doRefresh();
  return localStorage.getItem('sp_at');
}
function doLogout() {
  ['sp_at','sp_rt','sp_exp','sp_cid','sp_ver'].forEach(k=>localStorage.removeItem(k));
  clearInterval(pollId); clearInterval(tickId);
  trackId=null; lyrLines=null; aiCache={};
  document.getElementById('bg-blur').className='';
  showScreen('login-screen');
}

/* ══════════════════════════════════════
   SPOTIFY API
══════════════════════════════════════ */
async function spGet(path) {
  const tok=await getTok();
  const r=await fetch('https://api.spotify.com/v1'+path,{headers:{Authorization:'Bearer '+tok}});
  if(r.status===204||r.status===202) return null;
  if(!r.ok) return null;
  return r.json();
}
async function spPut(path,body) {
  const tok=await getTok();
  return fetch('https://api.spotify.com/v1'+path,{method:'PUT',
    headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},
    body:body!==undefined?JSON.stringify(body):undefined});
}
async function spPost(path) {
  const tok=await getTok();
  return fetch('https://api.spotify.com/v1'+path,{method:'POST',headers:{Authorization:'Bearer '+tok}});
}

/* ══════════════════════════════════════
   LRCLIB — SYNCED LYRICS
══════════════════════════════════════ */
function parseLRC(lrc) {
  const lines=[];
  for(const raw of lrc.split('\n')) {
    const m=raw.match(/^\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/);
    if(m) {
      const ms=(parseInt(m[1])*60+parseInt(m[2]))*1000+parseInt(m[3].padEnd(3,'0'));
      lines.push({timeMs:ms,text:m[4].trim()});
    }
  }
  return lines.sort((a,b)=>a.timeMs-b.timeMs);
}
function plainToLines(plain) {
  return plain.split('\n').map(l=>l.trim())
    .filter((l,i,a)=>!(l===''&&a[i-1]===''))
    .map(text=>({timeMs:-1,text}));
}
async function fetchLyrics(artist,title,album,durationMs) {
  const durSec=Math.round(durationMs/1000);
  const clean=s=>s.replace(/\s*[\(\[\-–].*/g,'').trim();
  const tryGet=async(a,t,al,dur)=>{
    try {
      const p=new URLSearchParams({artist_name:a,track_name:t});
      if(al) p.set('album_name',al); if(dur) p.set('duration',dur);
      const r=await fetch('https://lrclib.net/api/get?'+p,{headers:{'Lrclib-Client':'George-Lyrics/1.0'}});
      if(!r.ok) return null;
      const d=await r.json();
      if(d.syncedLyrics) return {lines:parseLRC(d.syncedLyrics),synced:true};
      if(d.plainLyrics)  return {lines:plainToLines(d.plainLyrics),synced:false};
    } catch {} return null;
  };
  const trySearch=async(a,t)=>{
    try {
      const r=await fetch(`https://lrclib.net/api/search?artist_name=${encodeURIComponent(a)}&track_name=${encodeURIComponent(t)}`,
        {headers:{'Lrclib-Client':'George-Lyrics/1.0'}});
      if(!r.ok) return null;
      const res=await r.json(); if(!res?.length) return null;
      const scored=res.map(x=>({...x,dd:Math.abs((x.duration||0)-durSec)})).sort((a,b)=>a.dd-b.dd);
      const best=scored.find(x=>x.syncedLyrics)||scored.find(x=>x.plainLyrics);
      if(!best) return null;
      if(best.syncedLyrics) return {lines:parseLRC(best.syncedLyrics),synced:true};
      if(best.plainLyrics)  return {lines:plainToLines(best.plainLyrics),synced:false};
    } catch {} return null;
  };
  return (await tryGet(artist,title,album,durSec))
      ||(await tryGet(clean(artist),clean(title),'',0))
      ||(await trySearch(artist,title))
      ||(await trySearch(clean(artist),clean(title)))
      ||null;
}

/* ══════════════════════════════════════
   GEMINI AI
══════════════════════════════════════ */
let aiLang = localStorage.getItem('ai_lang') || 'CZ';
let aiCache = {}; // trackId → insight JSON

function getGeminiKey() { return localStorage.getItem('gemini_key')||''; }
function saveGeminiKey(k) { k?localStorage.setItem('gemini_key',k):localStorage.removeItem('gemini_key'); }
function toggleLang() {
  aiLang=aiLang==='CZ'?'EN':'CZ';
  localStorage.setItem('ai_lang',aiLang);
  document.getElementById('btn-lang').textContent=aiLang;
  document.getElementById('ai-lang-label').textContent=aiLang;
  // Clear cache so next request uses new lang
  aiCache={};
  toast('Jazyk AI: '+aiLang);
}

async function fetchSongInsight(artist,title,album,year) {
  const apiKey=getGeminiKey();
  if(!apiKey) return null;
  const langNote=aiLang==='CZ'?'Respond in Czech language.':'Respond in English.';
  const prompt=`You are a music expert. For the song "${title}" by ${artist}${album?` (album: ${album}, ${year})`:''},
respond with ONLY a valid JSON object, no markdown:
{"why_written":"2-3 sentences: origin/inspiration","meaning":"2-3 sentences: lyrical themes/metaphors","mood":"1 sentence: sonic+emotional feel","fun_fact":"1 surprising fact","genres":["3-5 tags"],"similar_artists":["3 names"],"concerts":[{"date":"YYYY-MM-DD","venue":"Name","city":"City, Country"}]}
concerts: up to 5 confirmed European dates 2025-2026, empty array if unknown, never invent.
${langNote}`;
  try {
    const res=await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
      {method:'POST',headers:{'Content-Type':'application/json'},
       body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.7,maxOutputTokens:800}})}
    );
    const data=await res.json();
    if(data.error) {
      const code=data.error.code, msg=data.error.message||'';
      if(code===429) {
        const wait=msg.match(/retry in ([\d.]+)s/i);
        const delay=wait?Math.ceil(parseFloat(wait[1]))*1000:20000;
        await new Promise(r=>setTimeout(r,delay));
        const r2=await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
          {method:'POST',headers:{'Content-Type':'application/json'},
           body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.7,maxOutputTokens:800}})}
        );
        const d2=await r2.json();
        if(d2.error) { console.warn('Gemini retry failed:',d2.error.message); return null; }
        return JSON.parse((d2.candidates?.[0]?.content?.parts?.[0]?.text||'').replace(/```json|```/g,'').trim());
      }
      console.warn('Gemini error:',msg); return null;
    }
    const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
    return JSON.parse(text.replace(/```json|```/g,'').trim());
  } catch(e) { console.warn('Gemini failed:',e); return null; }
}

function renderAIPanel(insight) {
  const panel=document.getElementById('ai-panel');
  if(!insight) { panel.innerHTML=''; return; }
  let h='';
  h+=`<div class="ai-section"><div class="ai-section-title">O písničce</div>`;
  if(insight.why_written) h+=`<div class="ai-insight"><div class="ai-insight-label">Vznik</div><div class="ai-insight-text">${esc(insight.why_written)}</div></div>`;
  if(insight.meaning)     h+=`<div class="ai-insight"><div class="ai-insight-label">Text</div><div class="ai-insight-text">${esc(insight.meaning)}</div></div>`;
  if(insight.mood)        h+=`<div class="ai-insight"><div class="ai-insight-label">Nálada</div><div class="ai-insight-text">${esc(insight.mood)}</div></div>`;
  if(insight.fun_fact)    h+=`<div class="ai-insight"><div class="ai-insight-label">Zajímavost</div><div class="ai-insight-text">${esc(insight.fun_fact)}</div></div>`;
  if(insight.genres?.length||insight.similar_artists?.length) {
    if(insight.genres?.length) h+=`<div class="ai-insight"><div class="ai-insight-label">Žánry</div><div class="tag-row">${insight.genres.map(g=>`<span class="tag">${esc(g)}</span>`).join('')}</div></div>`;
    if(insight.similar_artists?.length) h+=`<div class="ai-insight"><div class="ai-insight-label">Podobní</div><div class="tag-row">${insight.similar_artists.map(a=>`<span class="tag">${esc(a)}</span>`).join('')}</div></div>`;
  }
  h+=`</div>`;
  // Concerts
  const concerts=insight.concerts||[];
  h+=`<div class="ai-section"><div class="ai-section-title">Koncerty v Evropě</div>`;
  if(concerts.length) {
    concerts.forEach(e=>{
      const dt=new Date(e.date);
      const ds=isNaN(dt)?e.date:dt.toLocaleDateString('cs-CZ',{day:'numeric',month:'short',year:'numeric'});
      h+=`<div class="concert-item"><div class="concert-date">${esc(ds)}</div><div class="concert-venue">${esc(e.venue||'')}</div><div class="concert-city">${esc(e.city||'')}</div></div>`;
    });
  } else h+=`<div class="ai-empty">Žádné nadcházející koncerty</div>`;
  h+=`</div>`;
  panel.innerHTML=h;
}

let aiFirstShown=false;
async function triggerAI(auto=false) {
  if(!trackId) return;
  const apiKey=getGeminiKey();
  if(!apiKey) { if(!auto) toast('Nastav Gemini klíč — tlačítko AI ve spodní liště'); return; }

  // Use cache if available
  if(aiCache[trackId+aiLang]) { renderAIPanel(aiCache[trackId+aiLang]); return; }

  const btn=document.getElementById('ai-btn');
  btn.textContent='Analyzuji…'; btn.classList.add('loading');

  const insight=await fetchSongInsight(
    currentArtist, currentTitle, currentAlbum, currentYear
  );
  btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg> Analyzovat písničku <span class="lang-toggle" id="ai-lang-label">${aiLang}</span>`;
  btn.classList.remove('loading');

  if(insight) {
    aiCache[trackId+aiLang]=insight;
    renderAIPanel(insight);
  } else if(!auto) {
    toast('AI analýza selhala — zkontroluj Gemini klíč',true);
  }
}

function toggleKaraoke() {
  isKaraoke=!isKaraoke;
  document.body.classList.toggle('karaoke',isKaraoke);
  document.getElementById('btn-kar').classList.toggle('active',isKaraoke);
  toast(isKaraoke?'Karaoke režim zapnut':'Karaoke režim vypnut');

// Called every 250ms tick — updates karaoke fill percentage
function updateKaraokeFill() {
  if(!isKaraoke||!lyrLines) return;
  const activeEl=document.querySelector('.lyric-line.active');
  if(!activeEl) return;
  const idx=getActiveIdx(lyrLines,posMs);
  // Find next non-blank line to estimate duration
  let nextMs=durMs;
  for(let i=idx+1;i<lyrLines.length;i++){
    if(lyrLines[i].text!==''){nextMs=lyrLines[i].timeMs;break;}
  }
  const lineStart=isSynced?(lyrLines[idx]?.timeMs||posMs):posMs;
  const lineDur=Math.max(500,nextMs-lineStart);
  const pct=Math.min(100,Math.max(0,(posMs-lineStart)/lineDur*100));
  activeEl.style.setProperty('--kar-pct',pct+'%');
}

function seekToLine(idx) {
  if(!isSynced||!lyrLines?.[idx]) return;
  const ms=lyrLines[idx].timeMs;
  if(ms<0) return;
  posMs=ms;
  const tok=getTok().then(t=>{
    fetch(`https://api.spotify.com/v1/me/player/seek?position_ms=${ms}`,
      {method:'PUT',headers:{Authorization:'Bearer '+t}});
  });
  renderLyrics(lyrLines,getActiveIdx(lyrLines,posMs));
}

  try {
    const res=await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
      {method:'POST',headers:{'Content-Type':'application/json'},
       body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.85,maxOutputTokens:1200}})}
    );
    const data=await res.json();
    if(data.error){throw new Error(data.error.message);}
    const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
    const tracks=JSON.parse(text.replace(/```json|```/g,'').trim());

    // Search each track on Spotify to get URI + art
    moodTracks=[];
    for(const t of tracks.slice(0,15)) {
      try {
        const q=encodeURIComponent(`track:${t.name} artist:${t.artist}`);
        const sr=await spGet(`/search?q=${q}&type=track&limit=1`);
        const item=sr?.tracks?.items?.[0];
        if(item) {
          moodTracks.push({
            name:item.name, artist:item.artists.map(a=>a.name).join(', '),
            uri:item.uri, art:item.album?.images?.[0]?.url||'',
            reason:t.reason, id:item.id
          });
        } else {
          moodTracks.push({name:t.name,artist:t.artist,uri:null,art:'',reason:t.reason,id:null});
        }
      } catch{}
    }

    renderMoodPopup();
  } catch(e) {
    document.getElementById('mood-popup-body').innerHTML=`<div style="padding:32px;text-align:center;font-family:Inconsolata,monospace;font-size:.7rem;color:var(--rust)">Chyba: ${esc(e.message)}</div>`;
  }
}

function renderMoodPopup() {
  const body=document.getElementById('mood-popup-body');
  body.innerHTML=moodTracks.map((t,i)=>`
    <div class="popup-track">
      <span class="popup-track-num">${i+1}</span>
      ${t.art?`<img class="popup-track-art" src="${t.art}" alt="">`:'<div class="popup-track-art"></div>'}
      <div class="popup-track-info">
        <div class="popup-track-name">${esc(t.name)}</div>
        <div class="popup-track-artist">${esc(t.artist)}</div>
        ${t.reason?`<div style="font-size:.62rem;color:var(--text-faint);margin-top:1px;font-style:italic">${esc(t.reason)}</div>`:''}
      </div>
      ${t.uri?`<span class="popup-track-match">✓</span>`:'<span style="font-size:.6rem;color:var(--text-faint)">?</span>'}
    </div>`).join('');

  const available=moodTracks.filter(t=>t.uri);
  const footer=document.getElementById('mood-popup-footer');
  footer.innerHTML=`
    <button class="popup-btn" onclick="addMoodToQueue(5)">+ Přidat 5</button>
    <button class="popup-btn" onclick="addMoodToQueue(10)">+ Přidat 10</button>
    <button class="popup-btn primary" onclick="addMoodToQueue(${available.length})">+ Přidat vše (${available.length})</button>`;
}

async function addMoodToQueue(count) {
  const available=moodTracks.filter(t=>t.uri).slice(0,count);
  if(!available.length){toast('Žádné dostupné písničky',true);return;}
  const tok=await getTok();
  let added=0;
  for(const t of available) {
    try {
      await fetch(`https://api.spotify.com/v1/me/player/queue?uri=${encodeURIComponent(t.uri)}`,
        {method:'POST',headers:{Authorization:'Bearer '+tok}});
      added++;
    } catch{}
  }
  closeMoodPopup();
  toast(`Přidáno ${added} písniček do fronty`);
  setTimeout(poll,1000);
}

function closeMoodPopup(e) {
  if(e&&e.target!==document.getElementById('mood-popup')) return;
  document.getElementById('mood-popup').classList.remove('open');
}

/* ══════════════════════════════════════
   ACTIVE LINE
══════════════════════════════════════ */
function getActiveIdx(lines,pos) {
  if(!lines?.length) return -1;
  if(isSynced) {
    let lo=0,hi=lines.length-1,res=-1;
    while(lo<=hi){const mid=(lo+hi)>>1;if(lines[mid].timeMs<=pos){res=mid;lo=mid+1;}else hi=mid-1;}
    return res;
  }
  if(!durMs) return 0;
  const nb=lines.filter(l=>l.text!=='');
  const tgt=Math.floor((pos/durMs)*nb.length);
  let cnt=0;
  for(let i=0;i<lines.length;i++){if(lines[i].text!==''){if(cnt>=tgt)return i;cnt++;}}
  return lines.length-1;
}

/* ══════════════════════════════════════
   RENDER LYRICS
══════════════════════════════════════ */
function renderLyrics(lines,activeIdx) {
  const sc=document.getElementById('lyr-sc');
  const em=document.getElementById('lyr-empty');
  if(!lines?.length){sc.innerHTML='';sc.appendChild(em);return;}
  if(lines!==renderedLines){
    renderedLines=lines; lastActiveIdx=-2; sc.innerHTML='';
    lines.forEach((l,i)=>{
      const el=document.createElement('div');
      el.className='lyric-line'+(l.text===''?' blank':'');
      el.dataset.i=i;
      el.textContent=l.text||'';
      if(l.text) {
        el.setAttribute('data-text',l.text);
        el.addEventListener('click',()=>seekToLine(i));
      }
      sc.appendChild(el);
    });
  }
  if(activeIdx===lastActiveIdx) return;
  lastActiveIdx=activeIdx;
  sc.querySelectorAll('.lyric-line:not(.blank)').forEach(el=>{
    const i=+el.dataset.i;
    el.classList.remove('past','active','next','future');
    if(i<activeIdx) el.classList.add('past');
    else if(i===activeIdx) el.classList.add('active');
    else if(i===activeIdx+1) el.classList.add('next');
    else el.classList.add('future');
  });
  const activeEl=sc.querySelector('.lyric-line.active');
  if(activeEl){
    const vp=document.getElementById('lyr-vp');
    const target=activeEl.offsetTop-vp.offsetHeight*0.38;
    sc.style.transform=`translateY(${-Math.max(0,target)}px)`;
  }
}
function lyricsMsg(msg){
  document.getElementById('lyr-sc').innerHTML=`<div class="lyrics-empty"><div class="icon">♩</div><p>${esc(msg)}</p></div>`;
  renderedLines=null; lastActiveIdx=-2;
}

/* ══════════════════════════════════════
   RENDER QUEUE
══════════════════════════════════════ */
function renderQueue(items) {
  const list=document.getElementById('queue-list');
  if(!items?.length){list.innerHTML='<div style="padding:12px 16px;font-family:Inconsolata,monospace;font-size:.65rem;color:var(--text-faint)">Fronta je prázdná</div>';return;}

  // First item in queue is "next up" — but we also want to show currently playing
  // Mark first item as next (Spotify queue doesn't include current track)
  list.innerHTML=items.slice(0,30).map((it,i)=>{
    const art=it.album?.images?.[0]?.url||'';
    const isNext=i===0;
    return `<div class="q-item${isNext?' now-playing':''}">
      <span class="q-num">${isNext?'▶':''+( i+1)}</span>
      ${art?`<img class="q-art" src="${art}" loading="lazy" alt="">`:'<div class="q-art"></div>'}
      <div class="q-info"><div class="q-title">${esc(it.name)}</div><div class="q-artist">${esc(it.artists?.map(a=>a.name).join(', ')||'')}</div></div>
      <span class="q-dur">${fmtMs(it.duration_ms||0)}</span>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════
   ALBUM ART BG BLUR
══════════════════════════════════════ */
function setBlurBg(url) {
  const el=document.getElementById('bg-blur');
  if(url){el.style.backgroundImage=`url(${url})`;el.classList.add('visible');}
  else el.classList.remove('visible');
}

/* ══════════════════════════════════════
   FULLSCREEN
══════════════════════════════════════ */
function toggleFullscreen() {
  isFullscreen=!isFullscreen;
  document.body.classList.toggle('fullscreen',isFullscreen);
  document.getElementById('btn-fs').classList.toggle('active',isFullscreen);
  // Real OS fullscreen
  if(isFullscreen) {
    (document.documentElement.requestFullscreen||document.documentElement.webkitRequestFullscreen||function(){}).call(document.documentElement);
  } else {
    (document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document);
  }
}
// Sync if user presses Escape
document.addEventListener('fullscreenchange',()=>{
  if(!document.fullscreenElement&&isFullscreen){
    isFullscreen=false;
    document.body.classList.remove('fullscreen');
    document.getElementById('btn-fs')?.classList.remove('active');
  }
});

/* ══════════════════════════════════════
   POLL — every 3s
══════════════════════════════════════ */
async function poll() {
  const [state,queue]=await Promise.all([
    spGet('/me/player?additional_types=track'),
    spGet('/me/player/queue')
  ]);
  if(queue) renderQueue(queue.queue);
  if(!state?.item){lyricsMsg('Nic se nepřehrává');return;}

  const track=state.item;
  playing=state.is_playing;
  posMs=state.progress_ms||0;
  durMs=track.duration_ms||0;

  document.getElementById('play-svg').innerHTML=playing
    ?'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    :'<path d="M8 5v14l11-7z"/>';
  document.getElementById('btn-shuf').classList.toggle('on',!!state.shuffle_state);
  document.getElementById('btn-rep').classList.toggle('on',state.repeat_state!=='off');
  updateProgress();

  if(track.id!==trackId) {
    trackId=track.id;
    lyrLines=null; isSynced=false; renderedLines=null;

    currentArtist=track.artists?.map(a=>a.name).join(', ')||'';
    currentTitle=track.name;
    currentAlbum=track.album?.name||'';
    currentYear=track.album?.release_date?.slice(0,4)||'';

    // Art + blur bg (right panel only)
    const artUrl=track.album?.images?.[0]?.url||'';
    setBlurBg(artUrl);

    // Top bar badge
    const tbArt=document.getElementById('tb-art');
    tbArt.src=artUrl; tbArt.style.display=artUrl?'':'none';
    document.getElementById('tb-name').textContent=track.name;
    document.getElementById('tb-artist').textContent=currentArtist;
    document.getElementById('tb-album').textContent=currentAlbum;

    document.getElementById('bpm-badge').style.display='none';

    // Fade out old lyrics, then load new ones
    const sc=document.getElementById('lyr-sc');
    sc.classList.add('fading');
    setTimeout(()=>{
      sc.classList.remove('fading');
      sc.style.transform='translateY(0)';
    },300);

    // Lyrics
    const badge=document.getElementById('src-badge');
    badge.textContent=''; badge.className='badge-pill';
    lyricsMsg('Hledám text…');
    fetchLyrics(currentArtist,track.name,currentAlbum,durMs).then(result=>{
      if(!result){badge.textContent='nenalezeno';lyricsMsg(`Text „${track.name}" nebyl nalezen`);return;}
      lyrLines=result.lines; isSynced=result.synced;
      badge.textContent=result.synced?'synced ✓':'unsynced';
      badge.className='badge-pill'+(result.synced?' synced':'');
      renderLyrics(lyrLines,getActiveIdx(lyrLines,posMs));
    });

    // Auto-show AI only on very first track ever
    document.getElementById('ai-panel').innerHTML='';
    if(!aiFirstShown && getGeminiKey()) {
      aiFirstShown=true;
      setTimeout(()=>triggerAI(true),1500);
    }

    // Check if track is liked
    isLiked=false; updateLikeBtn();
    checkLiked(track.id);

  } else if(lyrLines) {
    renderLyrics(lyrLines,getActiveIdx(lyrLines,posMs));
  }
}

/* ══════════════════════════════════════
   PROGRESS TICK
══════════════════════════════════════ */
function updateProgress() {
  if(!durMs) return;
  document.getElementById('prog-fill').style.width=Math.min(100,posMs/durMs*100)+'%';
  document.getElementById('t-cur').textContent=fmtMs(posMs);
  document.getElementById('t-tot').textContent=fmtMs(durMs);
}
function startTick() {
  if(tickId) clearInterval(tickId);
  tickId=setInterval(()=>{
    if(!playing) return;
    posMs=Math.min(posMs+250,durMs);
    updateProgress();
    if(lyrLines) renderLyrics(lyrLines,getActiveIdx(lyrLines,posMs));
    if(isKaraoke) updateKaraokeFill();
  },250);
}

/* ══════════════════════════════════════
   CONTROLS
══════════════════════════════════════ */
async function doPlayPause() {
  if(playing){await spPut('/me/player/pause');playing=false;}
  else{await spPut('/me/player/play');playing=true;}
  document.getElementById('play-svg').innerHTML=playing
    ?'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    :'<path d="M8 5v14l11-7z"/>';
  setTimeout(poll,300);
}
async function doNext(){await spPost('/me/player/next');trackId=null;setTimeout(poll,500);}
async function doPrev(){await spPost('/me/player/previous');trackId=null;setTimeout(poll,500);}
async function doShuffle(){
  const on=document.getElementById('btn-shuf').classList.contains('on');
  await spPut(`/me/player/shuffle?state=${!on}`);
  document.getElementById('btn-shuf').classList.toggle('on',!on);
}
async function doRepeat(){
  const on=document.getElementById('btn-rep').classList.contains('on');
  await spPut(`/me/player/repeat?state=${on?'off':'track'}`);
  document.getElementById('btn-rep').classList.toggle('on',!on);
}
async function doVol(v){await spPut(`/me/player/volume?volume_percent=${v}`);}

/* ══════════════════════════════════════
   KEYBOARD SHORTCUTS
══════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.code==='Space'){e.preventDefault();doPlayPause();}
  else if(e.code==='ArrowRight'){e.preventDefault();doNext();}
  else if(e.code==='ArrowLeft'){e.preventDefault();doPrev();}
  else if(e.code==='KeyF'){e.preventDefault();toggleFullscreen();}
  else if(e.code==='KeyK'){e.preventDefault();toggleKaraoke();}
  else if(e.code==='KeyL'){e.preventDefault();toggleLike();}
});

/* ══════════════════════════════════════
   UTILS
══════════════════════════════════════ */
function fmtMs(ms){const s=Math.floor(ms/1000);return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showScreen(id){document.querySelectorAll('.screen').forEach(el=>el.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}
function setStatus(t){document.getElementById('load-status').textContent=t;}
function toast(msg,err=false){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='show'+(err?' err':'');
  setTimeout(()=>el.className='',3200);
}

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
async function init() {
  document.getElementById('redir-display').textContent=REDIR;
  const saved=localStorage.getItem('sp_cid');
  if(saved) document.getElementById('cid').value=saved;
  const savedGk=getGeminiKey();
  if(savedGk) document.getElementById('gkey').value=savedGk;
  document.getElementById('btn-lang').textContent=aiLang;

  // Restore font size
  const savedFont=localStorage.getItem('font_size_idx');
  if(savedFont!==null) fontSizeIdx=parseInt(savedFont)||1;
  applyFontSize();

  const p=new URLSearchParams(location.search);
  const code=p.get('code'),error=p.get('error');
  if(error){toast('Přihlášení zrušeno',true);showScreen('login-screen');return;}
  if(code){
    showScreen('loading-screen');setStatus('Přihlašuji…');
    history.replaceState({},'',location.pathname);
    if(!await exchangeCode(code)){toast('Chyba přihlášení',true);showScreen('login-screen');return;}
  }
  if(!await getTok()){showScreen('login-screen');return;}
  showScreen('loading-screen');setStatus('Načítám…');
  showScreen('player-screen');
  await poll();
  startTick();
  pollId=setInterval(poll,3000);
}

init();
</script>
